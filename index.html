<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Meetup Shop</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Product+Sans:wght@400;700&display=swap');

        :root {
            --bg-color: #0b0c10;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-color: #e0e0e0;
            --text-muted: #a0a0a0;
            --accent-color: #4f46e5;
            --accent-glow: rgba(79, 70, 229, 0.4);
            --success-color: #10b981;
            --glass-blur: blur(12px);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Product Sans', 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(79, 70, 229, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(16, 185, 129, 0.1) 0%, transparent 40%);
            background-attachment: fixed;
        }

        header {
            width: 100%;
            max-width: 1200px;
            padding: 2rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(45deg, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .cart-btn {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            color: var(--text-color);
            padding: 0.6rem 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .cart-btn:hover {
            border-color: var(--accent-color);
            box-shadow: 0 0 15px var(--accent-glow);
            transform: translateY(-2px);
        }

        .cart-count {
            background: var(--accent-color);
            color: white;
            border-radius: 50%;
            padding: 2px 8px;
            font-size: 0.8rem;
        }

        main {
            width: 100%;
            max-width: 1200px;
            padding: 1rem;
            flex: 1;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .product-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-radius: 16px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .product-title {
            font-size: 1.4rem;
            margin-bottom: 0.5rem;
            color: #fff;
        }

        .product-desc {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 1.5rem;
        }

        .product-actions {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-top: auto;
        }

        .product-price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.4rem;
        }

        .product-price {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--success-color);
        }

        /* Master Button Class */
        .btn {
            width: 100%;
            padding: 0.7rem;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            border: none;
            text-align: center;
        }

        .test-btn {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid var(--card-border);
        }

        .test-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: var(--text-muted);
        }

        .add-btn {
            background: var(--accent-color);
            color: #fff;
        }

        .add-btn:hover {
            background: #4338ca;
        }

        .btn:active {
            transform: scale(0.98);
        }

        /* Overlays */
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 1rem;
        }

        .modal-box {
            background: rgba(15, 15, 25, 0.98);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            width: 100%;
            max-width: 950px; /* Widened to perfectly support side-by-side split panels */
            padding: 2.5rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            position: relative;
            max-height: 95vh;
            overflow-y: auto;
        }

        .close-btn {
            position: absolute;
            top: 1.2rem;
            right: 1.2rem;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.6rem;
            cursor: pointer;
            transition: color 0.2s;
            z-index: 10;
        }

        .close-btn:hover {
            color: #fff;
        }

        /* 🚀 SIDE-BY-SIDE SIDEBAR SPLIT LAYOUT CONTAINER */
        .modal-split-layout {
            display: grid;
            grid-template-columns: 1.4fr 1fr; /* Preview screen gets a bit more space than info side */
            gap: 2rem;
            align-items: start;
        }

        /* Automatically stacks top-to-bottom on smaller mobile viewports */
        @media (max-width: 768px) {
            .modal-split-layout {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }
        }

        /* Left Side: Large Template Preview Area */
        .sandbox-panel {
            background: #06070a;
            border: 1px solid var(--card-border);
            border-radius: 14px;
            overflow: hidden;
            width: 100%;
        }

        .sandbox-iframe {
            width: 100%;
            height: 500px; 
            background: #111216;
            border: none;
            display: block;
        }

        /* Right Side: Info Panel & Button stack */
        .info-panel {
            display: flex;
            flex-direction: column;
            height: 100%;
            justify-content: flex-start;
        }

        .info-panel h2 {
            font-size: 1.8rem;
            color: #fff;
            margin-bottom: 0.8rem;
        }

        .info-panel p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 2rem;
        }

        .modal-action-buttons {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-top: auto; /* Pushes button stack to the bottom of the info block */
        }

        .run-template-btn {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid var(--card-border);
        }

        .run-template-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: var(--text-muted);
        }

        /* Checkout Form Formatting */
        .cart-summary-list {
            list-style: none;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 1rem;
        }

        .cart-summary-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        .cart-total-display {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
            color: var(--success-color);
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .form-group input, .form-group textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            padding: 0.8rem;
            color: #fff;
            font-size: 1rem;
            outline: none;
        }

        .form-group input:focus, .form-group textarea:focus {
            border-color: var(--accent-color);
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--accent-color), #6366f1);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }

        .empty-cart-text {
            color: var(--text-muted);
            text-align: center;
            margin: 2rem 0;
        }
    </style>
</head>
<body>

    <header>
        <h1>Code Meetup Shop</h1>
        <button class="cart-btn" onclick="toggleOverlay('checkout-modal', true)">
            Cart <span class="cart-count" id="cart-count">0</span>
        </button>
    </header>

    <main>
        <div class="products-grid" id="products-target"></div>
    </main>

    <!-- SIDE-BY-SIDE MODAL TESTER INTERACTIVE INTERFACE -->
    <div class="overlay" id="test-modal">
        <div class="modal-box">
            <button class="close-btn" onclick="toggleOverlay('test-modal', false)">&times;</button>
            
            <div class="modal-split-layout">
                <!-- Column 1 (Left Side): Expanded Screen Display -->
                <div class="sandbox-panel">
                    <iframe class="sandbox-iframe" id="modal-sandbox-frame" sandbox="allow-scripts allow-modals"></iframe>
                </div>
                
                <!-- Column 2 (Right Side): Product Content Stack -->
                <div class="info-panel">
                    <h2 id="modal-product-title">Template Tester</h2>
                    <p id="modal-product-desc"></p>
                    
                    <div class="modal-action-buttons">
                        <button class="btn run-template-btn" id="modal-run-btn">Run Code Template</button>
                        <button class="btn add-btn" id="modal-add-to-cart-direct">Add Template to Cart</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- CHECKOUT FORM OVERLAY -->
    <div class="overlay" id="checkout-modal">
        <div class="modal-box">
            <button class="close-btn" onclick="toggleOverlay('checkout-modal', false)">&times;</button>
            <h2>Your Order Details</h2>
            
            <div id="cart-contents-wrapper">
                <ul class="cart-summary-list" id="cart-summary-list"></ul>
                <div class="cart-total-display">
                    <span>Total (Fake Balance):</span>
                    <span id="cart-total-price">$0.00</span>
                </div>
            </div>

            <form id="meetup-form" action="https://formspree.io/f/meewvbny" method="POST">
                <input type="hidden" name="Ordered_Items" id="hidden-cart-items">
                <input type="hidden" name="Total_Cost" id="hidden-cart-total">

                <div class="form-group">
                    <label for="buyer-name">Your Name</label>
                    <input type="text" id="buyer-name" name="Buyer_Name" placeholder="Alex Smith" required>
                </div>

                <div class="form-group">
                    <label for="buyer-email">Your Email Address</label>
                    <input type="email" id="buyer-email" name="Buyer_Email" placeholder="alex@example.com" required>
                </div>

                <div class="form-group">
                    <label for="meetup-details">Proposed Meetup Location & Time</label>
                    <textarea id="meetup-details" name="Meetup_Preferences" rows="3" placeholder="e.g., Library computer lab, tomorrow during lunch session" required></textarea>
                </div>

                <button type="submit" class="submit-btn">Request Meetup & Code</button>
            </form>
        </div>
    </div>

    <script>
        // ==========================================
        //  EASY TO ADD/CUSTOMIZE PRODUCTS ARRAY
        // ==========================================
        const productDatabase = [
            {
                id: "loading-screen",
                title: "VIP Loading Screen",
                desc: "A Loading Screen Used to Make the Best ever entertaining Loading screens out there, come check it out!",
                price: 1.00,
                fileLocation: "templete1.html" 
            },
            {
                id: "glootok-feed",
                title: "GlooTok Video Component",
                desc: "Infinite scroll and localized content feed element configurations designed to manage dynamic interface grids independently.",
                price: 25.00,
                fileLocation: "templete2.html"
            },
            {
                id: "garden-canvas",
                title: "Procedural Canvas Element",
                desc: "A custom interactive UI node mapped directly within standard HTML canvas modules to manage real-time structural items cleanly.",
                price: 30.00,
                fileLocation: "templete3.html"
            }
        ];

        let cart = [];

        // Build HTML Storefront Cards
        function buildShopCards() {
            const container = document.getElementById('products-target');
            container.innerHTML = productDatabase.map(prod => `
                <div class="product-card">
                    <div>
                        <h3 class="product-title">${prod.title}</h3>
                        <p class="product-desc">${prod.desc}</p>
                    </div>
                    <div class="product-actions">
                        <div class="product-price-row">
                            <span class="text-muted">Meetup Pack</span>
                            <span class="product-price">$${prod.price.toFixed(2)}</span>
                        </div>
                        <button class="btn test-btn" onclick="openTesterGui('${prod.id}')">Test Template</button>
                        <button class="btn add-btn" onclick="addToCart('${prod.title}', ${prod.price})">Add to Cart</button>
                    </div>
                </div>
            `).join('');
        }

        // GUI TESTER CONTROL ENGINE
        function openTesterGui(productId) {
            const product = productDatabase.find(p => p.id === productId);
            if (!product) return;

            document.getElementById('modal-product-title').innerText = product.title;
            document.getElementById('modal-product-desc').innerText = product.desc;
            
            const iframe = document.getElementById('modal-sandbox-frame');
            
            function runTemplateCode() {
                iframe.src = product.fileLocation;
            }

            document.getElementById('modal-run-btn').onclick = runTemplateCode;

            document.getElementById('modal-add-to-cart-direct').onclick = function() {
                addToCart(product.title, product.price);
                toggleOverlay('test-modal', false);
            };

            toggleOverlay('test-modal', true);
            runTemplateCode();
        }

        // Overlay Controllers
        function toggleOverlay(id, show) {
            document.getElementById(id).style.display = show ? 'flex' : 'none';
        }

        // Cart Controllers
        function addToCart(title, price) {
            cart.push({ title, price });
            updateCartUI();
        }

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const listElement = document.getElementById('cart-summary-list');
            const totalElement = document.getElementById('cart-total-price');
            const formWrapper = document.getElementById('meetup-form');
            
            if (cart.length === 0) {
                listElement.innerHTML = `<p class="empty-cart-text">Your cart is empty. Add items to request a meetup!</p>`;
                totalElement.innerText = "$0.00";
                formWrapper.style.display = "none";
            } else {
                formWrapper.style.display = "block";
                listElement.innerHTML = cart.map(item => `
                    <li class="cart-summary-item">
                        <span>${item.title}</span>
                        <span>$${item.price.toFixed(2)}</span>
                    </li>
                `).join('');
                
                const total = cart.reduce((sum, item) => sum + item.price, 0);
                const totalText = `$${total.toFixed(2)}`;
                totalElement.innerText = totalText;

                document.getElementById('hidden-cart-items').value = cart.map(item => item.title).join(', ');
                document.getElementById('hidden-cart-total').value = totalText;
            }
        }

        document.getElementById('meetup-form').addEventListener('submit', function() {
            setTimeout(() => {
                cart = [];
                updateCartUI();
                toggleOverlay('checkout-modal', false);
            }, 100);
        });

        buildShopCards();
        updateCartUI();
    </script>
</body>
</html>
